<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playfair Cipher</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .main-card { border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); background: #fff; padding: 30px; margin-top: 30px; }
        .matrix-table { margin: 20px auto; max-width: 250px; }
        .matrix-table td { width: 45px; height: 45px; text-align: center; vertical-align: middle !important; font-weight: bold; font-size: 1.2rem; background-color: #e9ecef; border: 2px solid #fff !important; color: #495057; border-radius: 4px; }
        .result-box { background-color: #e8f4fd; border-left: 4px solid #007bff; padding: 15px; border-radius: 4px; word-break: break-all; }
    </style>
</head>
<body>
    <div class="container mb-5">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="main-card">
                    <h2 class="text-center font-weight-bold text-dark text-uppercase mb-4">Playfair Cipher Management</h2>
                    <div class="text-center mb-4"><a href="/" class="btn btn-sm btn-outline-secondary">← Quay lại Trang Chủ</a></div>
                    
                    <div class="row">
                        <div class="col-md-6 border-right">
                            <h5 class="font-weight-bold text-primary mb-3">ENCRYPTION (Mã hóa)</h5>
                            <form id="encryptForm">
                                <div class="form-group">
                                    <label class="font-weight-600">Plain text:</label>
                                    <input type="text" class="form-control" name="plain_text" value="BAOMATTHONGTIN" required>
                                </div>
                                <div class="form-group">
                                    <label class="font-weight-600">Key (String):</label>
                                    <input type="text" class="form-control" name="key" value="HELLOYOU" required>
                                </div>
                                <button type="submit" class="btn btn-primary btn-block shadow-sm">Encrypt</button>
                            </form>

                            <hr class="my-4">

                            <h5 class="font-weight-bold text-success mb-3">DECRYPTION (Giải mã)</h5>
                            <form id="decryptForm">
                                <div class="form-group">
                                    <label class="font-weight-600">Cipher text:</label>
                                    <input type="text" class="form-control" name="cipher_text" value="CBYKUVHUHRFVFQ" required>
                                </div>
                                <div class="form-group">
                                    <label class="font-weight-600">Key (String):</label>
                                    <input type="text" class="form-control" name="key" value="HELLOYOU" required>
                                </div>
                                <button type="submit" class="btn btn-success btn-block shadow-sm">Decrypt</button>
                            </form>
                        </div>

                        <div class="col-md-6 d-flex flex-column align-items-center justify-content-start pt-3">
                            <h5 class="font-weight-bold text-secondary mb-3">PLAYFAIR MATRIX (5x5)</h5>
                            <div id="matrixContainer" class="text-center w-100 text-muted my-3">
                                <em>Chưa có ma trận được tạo. Hãy bấm Encrypt/Decrypt để hiển thị.</em>
                            </div>
                            
                            <h5 class="font-weight-bold text-secondary w-100 mt-3">RESULT</h5>
                            <div id="resultContainer" class="result-box w-100 text-muted">
                                Kết quả xử lý sẽ xuất hiện ở đây...
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script>
        // Hàm vẽ bảng ma trận từ mảng 2 chiều nhận được từ API
        function renderMatrix(matrix) {
            if (!matrix || matrix.length === 0) return;
            let html = '<table class="table matrix-table">';
            for (let i = 0; i < matrix.length; i++) {
                html += '<tr>';
                for (let j = 0; j < matrix[i].length; j++) {
                    html += `<td>${matrix[i][j]}</td>`;
                }
                html += '</tr>';
            }
            html += '</table>';
            document.getElementById('matrixContainer').innerHTML = html;
        }

        // Xử lý gửi form Mã Hóa
        document.getElementById('encryptForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const payload = {
                plain_text: formData.get('plain_text'),
                key: formData.get('key')
            };

            // Gọi API mã hóa
            let response = await fetch('/api/playfair/encrypt', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            let data = await response.json();

            // Gọi API lấy ma trận
            let matrixResponse = await fetch('/api/playfair/creatematrix', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ key: payload.key })
            });
            let matrixData = await matrixResponse.json();

            // Hiển thị dữ liệu lên màn hình
            renderMatrix(matrixData.playfair_matrix);
            document.getElementById('resultContainer').innerHTML = `
                <strong>Original Text:</strong> ${payload.plain_text}<br/>
                <strong>Key Used:</strong> ${payload.key}<br/>
                <strong class="text-primary">Encrypted Text:</strong> ${data.encrypted_text}
            `;
        });

        // Xử lý gửi form Giải Mã
        document.getElementById('decryptForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            const payload = {
                cipher_text: formData.get('cipher_text'),
                key: formData.get('key')
            };

            // Gọi API giải mã
            let response = await fetch('/api/playfair/decrypt', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            let data = await response.json();

            // Gọi API lấy ma trận
            let matrixResponse = await fetch('/api/playfair/creatematrix', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ key: payload.key })
            });
            let matrixData = await matrixResponse.json();

            // Hiển thị dữ liệu lên màn hình
            renderMatrix(matrixData.playfair_matrix);
            document.getElementById('resultContainer').innerHTML = `
                <strong>Cipher Text:</strong> ${payload.cipher_text}<br/>
                <strong>Key Used:</strong> ${payload.key}<br/>
                <strong class="text-success">Decrypted Text:</strong> ${data.decrypted_text}
            `;
        });
    </script>
</body>
</html>
